name: Evaluation

on: [push]

jobs:
  run_eval:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install verilator
        run: |
          tar -C ${HOME} -xzf "$GITHUB_WORKSPACE/prebuilt/github-actions-verilator-5.026.tar.gz"
          echo "${HOME}/verilator/bin" >> $GITHUB_PATH
          echo "PKG_CONFIG_PATH=${HOME}/verilator/share/pkgconfig:${PKG_CONFIG_PATH}" >> $GITHUB_ENV

      - name: Install iverilog
        run: |
          tar -C ${HOME} -xzf "$GITHUB_WORKSPACE/prebuilt/github-actions-iverilog-12.0.tar.gz"
          echo "${HOME}/iverilog/bin" >> $GITHUB_PATH

      - name: Install python packages
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/yaml/pyyaml

      - name: Run evaluations
        timeout-minutes: 15
        run: |
          mkdir -p build
          cd build
          ../configure
          make check-eval
